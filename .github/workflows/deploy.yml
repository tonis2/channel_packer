name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to main.
  push:
    branches: [main]
  # Allow manually re-running from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (WASM)
        # base-href must match the project repo path (served at /channel_packer/).
        run: flutter build web --wasm --release --base-href /channel_packer/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
